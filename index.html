<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadromierz × Pracuj — Pipeline Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <span class="brand-name">Kadromierz × Pracuj</span>
      <span class="brand-sub">Pipeline Dashboard</span>
    </div>
    <div class="header-tabs">
      <button class="tab-btn active" data-tab="director">Sales Director</button>
      <button class="tab-btn" data-tab="manager">Sales Manager</button>
    </div>
    <input type="file" id="file-input" accept=".json" multiple style="display:none">
  </header>

  <div class="sticky-filter">
    <span class="filter-label">Partner:</span>
    <div class="filter-pills">
      <button class="pill active" data-partner="all">Wszyscy</button>
      <button class="pill pill--pracuj" data-partner="Pracuj.pl">Pracuj.pl</button>
      <button class="pill pill--erecruiter" data-partner="eRecruiter">eRecruiter</button>
    </div>
    <span id="report-meta" class="report-meta"></span>
  </div>

  <!-- ===== DIRECTOR VIEW ===== -->
  <div id="view-director" class="view active">
    <div class="container">

      <div class="callout" id="callout-box"></div>

      <div class="kpi-strip" id="kpi-strip"></div>

      <div class="section-title">Trendy</div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-card-title">Nowe deale miesięcznie</div>
          <canvas id="chart-monthly" height="180"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Skumulowane deale</div>
          <canvas id="chart-cumulative" height="180"></canvas>
        </div>
      </div>

      <div class="charts-row charts-row--donuts">
        <div class="chart-card chart-card--donut">
          <div class="chart-card-title">Podział wg Partnera</div>
          <canvas id="chart-partner-split" height="160"></canvas>
        </div>
        <div class="chart-card chart-card--donut">
          <div class="chart-card-title">Status dealów</div>
          <canvas id="chart-status-split" height="160"></canvas>
        </div>
      </div>

      <div id="delta-section"></div>

    </div>
  </div>

  <!-- ===== MANAGER VIEW ===== -->
  <div id="view-manager" class="view">
    <div class="container">

      <div class="section-title">Wszystkie deale</div>
      <div class="card">
        <div class="table-controls">
          <input type="text" id="deal-search" class="search-input" placeholder="Szukaj po nazwie firmy...">
          <label class="toggle-label">
            <input type="checkbox" id="show-all-toggle">
            Pokaż wszystkie (z Won/Lost)
          </label>
        </div>
        <div id="deals-table-container"></div>
      </div>

      <div class="section-title">Wykresy</div>
      <div class="charts-row charts-row--thirds">
        <div class="chart-card">
          <div class="chart-card-title">Deale per miesiąc</div>
          <canvas id="chart-manager-monthly" height="220"></canvas>
        </div>
        <div class="chart-card" id="funnel-container">
          <div class="chart-card-title">Lejek sprzedażowy</div>
          <canvas id="chart-funnel" height="220"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Lost wg powodu utraty</div>
          <canvas id="chart-lost-stage" height="220"></canvas>
        </div>
      </div>

      <div id="funnel-flow-container" style="display:none">
        <canvas id="chart-funnel-flow"></canvas>
      </div>

      <div class="section-title">Lista Lost</div>
      <div class="card" id="lost-table-container"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
